<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>All OnBoard</title>

  <!-- Your brand stylesheet (Ambit font, colours, etc.) -->
  <link rel="stylesheet" href="styles/main.css" />

  <head>
   
  <!-- Page-specific helpers kept minimal to avoid touching global CSS -->
  <style>
    /* Full-bleed background image like the PowerPoint */
    .bg-full {
      position: fixed;
      inset: 0;
      background: #000 url("img/all-aboard-bg.jpg") center/cover no-repeat;
      z-index: -2;
    }
    .bg-full::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, rgba(0,0,0,.25), rgba(0,0,0,.25));
    }

    /* Raise the card higher so more of the ship is visible */
    .page-wrap {
      min-height: 100vh;
      display: grid;
      justify-items: center;          /* center horizontally */
      align-items: start;             /* anchor higher on the page */
      padding: clamp(16px, 3vw, 32px) clamp(16px, 4vw, 40px);
      padding-top: clamp(20px, 6vh, 60px); /* controls how high the card sits */
      box-sizing: border-box;
    }

    /* Smaller, transparent card so the ship shows through */
    .sky-card {
      width: min(600px, 90vw);                    /* smaller than before */
      border-radius: 18px;
      background: rgb(112, 203, 244);      /* transparent sky blue (use rgba for real transparency) */
      color: #092a5e;                             /* brand deep blue */
      box-shadow: 0 10px 28px rgba(0,0,0,.25);
      padding: clamp(20px, 4vw, 40px);
      display: grid;
      gap: clamp(10px, 2vw, 20px);
      font-family: 'Ambit', Arial, sans-serif;
      backdrop-filter: blur(4px);                 /* subtle glass effect */
    }

    /* BIG hero headline for ALL ONBOARD */
    .title {
      font-size: clamp(38px, 6vw, 72px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin: 0 0 6px 0;
      line-height: 1.05;
    }

    /* Keep the rest consistent and medium-sized */
    .daydate,
    .location,
    .bob .label,
    .bob .time {
      font-size: clamp(18px, 3vw, 28px);
      font-weight: 600;
      margin: 0;
    }

    .location {
      text-transform: uppercase;   /* matches your previous PORT/COUNTRY styling */
    }

    .bob {
      display: flex;
      align-items: baseline;
      gap: clamp(10px, 2vw, 24px);
      margin-top: clamp(6px, 1.2vw, 12px);
    }
    .bob .label {
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: .06em;
    }
    .bob .time {
      font-weight: 700;
    }

    /* Optional notes under the card (sits on top of the background) */
    .notes {
      margin-top: 12px;
      color: #ffffff;
      text-shadow: 0 1px 2px rgba(0,0,0,.5);
      font-size: clamp(12px, 1.6vw, 16px);
      text-align: center;
      font-family: 'Ambit', Arial, sans-serif;
      padding: 0 16px;
    }

    @media (max-width: 560px) {
      .bob { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <!-- Fixed background image (always the same) -->
  <div class="bg-full" aria-hidden="true"></div>

  <!-- Centered, transparent card content -->
  <div class="page-wrap">
    <section class="sky-card" id="card">
      <h1 class="title" id="title">ALL ONBOARD</h1>
      <p class="daydate" id="dayDate">Day Date</p>

      <!-- New single-line location (Port, Country) -->
      <p class="location" id="location">PORT, COUNTRY</p>

      <div class="bob">
        <div class="label">Back onboard:</div>
        <div class="time" id="bobTime">—</div>
      </div>
    </section>
  </div>

  <!-- Optional extra line below the card -->
  <div class="notes" id="notes"></div>

  <script>
    /*
      CONFIG
      - Fixed Sheet ID and Tab so the page works at /backonboard.html without parameters.
      - Cruise Directors edit ONE row in the tab below.

      SHEET STRUCTURE (row 1 headers, row 2 values):
      Day | DateText (or Date) | Port | Country | BackOnBoard | Notes
    */

    // === Hard-coded Google Sheet details ===
    const SHEET_ID = "10DCX_3LZlqSITNfTVNuvxvRBu_m0s5aPiYVQy_LkSiA"; // your sheet id
    const TAB_NAME = "Live";  // change here if your tab is named differently

    // Static title text (kept as JS so you can easily swap later if needed)
    const PAGE_TITLE = "ALL ONBOARD";
    document.getElementById("title").textContent = PAGE_TITLE;

    // Build OpenSheet URL and fetch data
    const url = `https://opensheet.elk.sh/${encodeURIComponent(SHEET_ID)}/${encodeURIComponent(TAB_NAME)}`;

    fetch(url)
      .then(r => r.json())
      .then(rows => {
        const row = rows && rows[0] ? rows[0] : {};

        const Day         = (row.Day || "").trim();
        const DateText    = (row.DateText || row.Date || "").trim(); // support 'DateText' or 'Date'
        const Port        = (row.Port || "").trim();
        const Country     = (row.Country || "").trim();
        const BackOnBoard = (row.BackOnBoard || "").trim();
        const Notes       = (row.Notes || "").trim();

        // Day + Date
        document.getElementById("dayDate").textContent = [Day, DateText].filter(Boolean).join(" ");

        // Location (Port, Country) with graceful fallbacks
        const location =
          Port && Country ? `${Port}, ${Country}` :
          Port ? Port :
          Country ? Country :
          "";
        document.getElementById("location").textContent = location.toUpperCase();

        // Back onboard time + notes
        document.getElementById("bobTime").textContent = BackOnBoard || "—";
        document.getElementById("notes").textContent   = Notes;

        // If the location text wraps and makes the card too tall, auto-fit the size of "location"
        autoFitLocation();
      })
      .catch(err => {
        console.error("Load failed", err);
        document.getElementById("card").innerHTML =
          "<div style='font:16px/1.4 Ambit, Arial, sans-serif'>Could not load data. Please check the Sheet ID, tab name, or network connection.</div>";
      });

    // Reduce the location font-size if the card overflows vertically (very long place names)
    function autoFitLocation(){
      const card = document.getElementById("card");
      const el = document.getElementById("location");
      let size = parseFloat(getComputedStyle(el).fontSize);
      let tries = 0;
      while (card.scrollHeight > card.clientHeight && size > 18 && tries < 25){
        size -= 2;
        el.style.fontSize = size + "px";
        tries++;
      }
    }
  </script>
</body>
</html>
